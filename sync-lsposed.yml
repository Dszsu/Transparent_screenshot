name: Sync Release to LSPosed Module Repo

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release APK
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.apk"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Write release body to file
        run: |
          cat <<'ENDOFBODY' > release_body.md
          ${{ github.event.release.body }}
          ENDOFBODY

      - name: Sync to Xposed-Modules-Repo
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"
          TARGET_TAG="${TAG}-${NAME}"

          # Append source link
          echo "" >> release_body.md
          echo "---" >> release_body.md
          echo "自动同步自 [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }})" >> release_body.md

          # Delete existing release if retrying
          gh release delete "$TARGET_TAG" \
            --repo Xposed-Modules-Repo/com.dszsu.tss --yes 2>/dev/null || true

          # Create new release with full notes
          gh release create "$TARGET_TAG" \
            --repo Xposed-Modules-Repo/com.dszsu.tss \
            --title "$NAME" \
            --notes-file release_body.md \
            *.apk
        env:
          GH_TOKEN: ${{ secrets.LSPOSED_PAT }}